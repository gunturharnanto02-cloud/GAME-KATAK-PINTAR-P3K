<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Katak Pintar P3K</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap');

        :root {
            --water-color: #2b8a3e; /* Warna rawa */
            --water-deep: #186429;
        }

        body {
            font-family: 'Nunito', sans-serif;
            background: linear-gradient(to bottom, #87CEEB, #e0f6ff);
            margin: 0;
            overflow: hidden;
            touch-action: manipulation;
            user-select: none;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        h1, h2, h3, .font-bold {
            font-family: 'Fredoka One', cursive;
        }

        /* Rain Overlay */
        #rain-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            z-index: 50;
            opacity: 0.6;
            display: none;
        }

        /* Split Screen Grid */
        #game-board {
            display: grid;
            width: 100%;
            height: 100%;
            transition: all 0.5s ease;
        }

        .layout-solo { grid-template-columns: 1fr; }
        .layout-duel { grid-template-columns: 1fr 1fr; }
        .layout-squad { grid-template-columns: 1fr 1fr 1fr 1fr; }

        /* Responsive untuk mode banyak pemain di layar sempit */
        @media (max-aspect-ratio: 3/4) {
            .layout-duel { grid-template-columns: 1fr; grid-template-rows: 1fr 1fr; }
            .layout-squad { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
        }

        /* Player Container */
        .player-container {
            border: 2px solid rgba(255,255,255,0.5);
            position: relative;
            display: flex;
            background: linear-gradient(to bottom, #a1c4fd 0%, #c2e9fb 100%);
            overflow: hidden;
        }

        /* Responsive Player Layout (Landscape vs Portrait) */
        .player-layout {
            display: flex;
            width: 100%;
            height: 100%;
            flex-direction: row; /* Default Landscape */
        }

        @media (orientation: portrait) {
            .player-layout {
                flex-direction: column; /* Portrait: Visual atas, Kontrol bawah */
            }
        }

        /* Game Visual Area */
        .game-visual {
            flex: 1;
            position: relative;
            background-color: var(--water-color);
            background-image: 
                radial-gradient(circle at 50% 100%, var(--water-color) 0%, var(--water-deep) 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
        }

        /* Controls Area */
        .game-controls {
            flex: 1;
            background: white;
            padding: 10px;
            display: flex;
            flex-direction: column;
            box-shadow: -4px 0 15px rgba(0,0,0,0.1);
            z-index: 10;
        }
        
        @media (orientation: portrait) {
            .game-controls {
                box-shadow: 0 -4px 15px rgba(0,0,0,0.1);
            }
        }

        /* Frog & Leaves */
        .frog {
            font-size: 3rem;
            position: absolute;
            bottom: 20px;
            transition: all 0.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 5;
            filter: drop-shadow(0 5px 5px rgba(0,0,0,0.3));
        }

        .leaf-platform {
            width: 100px;
            height: 40px;
            background-color: #4ade80;
            border-radius: 50%;
            position: absolute;
            border-bottom: 6px solid #166534;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 1.2rem;
            opacity: 0;
            transition: top 0.5s ease, opacity 0.3s;
        }

        /* Animations */
        @keyframes jump {
            0% { transform: translateY(0) scale(1, 1); }
            50% { transform: translateY(-50px) scale(0.9, 1.1); }
            100% { transform: translateY(0) scale(1, 1); }
        }

        @keyframes sink {
            0% { transform: translateY(0) rotate(0); opacity: 1; }
            50% { transform: translateY(20px) rotate(15deg); opacity: 0.8; }
            100% { transform: translateY(60px) rotate(45deg) scale(0.5); opacity: 0; }
        }

        .anim-jump { animation: jump 0.5s ease; }
        .anim-sink { animation: sink 1s ease forwards; }

        /* Water Ripple Effect */
        .ripple {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.8);
            border-radius: 50%;
            animation: ripple-anim 1s linear forwards;
            pointer-events: none;
        }

        @keyframes ripple-anim {
            0% { width: 0; height: 0; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 1; }
            100% { width: 150px; height: 50px; top: 50%; left: 50%; transform: translate(-50%, -50%); opacity: 0; }
        }

        /* Question & Answer UI */
        .question-card {
            background: #fff;
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            text-align: center;
            border: 3px solid #3b82f6;
            flex-shrink: 0;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            flex-grow: 1;
        }

        .answer-btn {
            background: #f0fdf4;
            border: 2px solid #22c55e;
            border-radius: 10px;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.1s, background 0.2s;
        }
        
        .answer-btn:active { transform: scale(0.95); }
        .answer-btn:hover { background: #dcfce7; }
        
        .answer-icon { font-size: 2rem; margin-bottom: 5px; }
        .answer-text { font-size: 0.9rem; text-align: center; font-weight: bold; line-height: 1.1; }

        .game-over-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.7);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            z-index: 20;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .game-over-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <!-- Audio Synth System (No external files needed) -->
    <script>
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let bgmOscillators = [];
        let isBgmPlaying = false;

        function playTone(freq, type, duration, vol=0.1) {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gainNode.gain.setValueAtTime(vol, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        function playJumpSound() {
            playTone(400, 'sine', 0.1, 0.2);
            setTimeout(() => playTone(600, 'sine', 0.2, 0.2), 50);
        }

        function playSplashSound() {
            playTone(100, 'triangle', 0.5, 0.5);
            playTone(50, 'sawtooth', 0.8, 0.3);
        }

        function playCorrectSound() {
            playTone(523.25, 'sine', 0.1, 0.1); // C5
            setTimeout(() => playTone(659.25, 'sine', 0.2, 0.1), 100); // E5
        }

        function playWrongSound() {
            playTone(300, 'sawtooth', 0.3, 0.2);
            setTimeout(() => playTone(250, 'sawtooth', 0.4, 0.2), 150);
        }

        function toggleBGM() {
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const btn = document.getElementById('bgm-btn');
            if (isBgmPlaying) {
                bgmOscillators.forEach(osc => osc.stop());
                bgmOscillators = [];
                isBgmPlaying = false;
                btn.innerHTML = '<i class="fas fa-volume-mute"></i> BGM Off';
                btn.classList.replace('bg-green-500', 'bg-red-500');
            } else {
                isBgmPlaying = true;
                btn.innerHTML = '<i class="fas fa-volume-up"></i> BGM On';
                btn.classList.replace('bg-red-500', 'bg-green-500');
                playBGM();
            }
        }

        function playBGM() {
            if(!isBgmPlaying) return;
            const melody = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63]; // C E G C G E
            let now = audioCtx.currentTime;
            
            melody.forEach((freq, i) => {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = 'sine';
                osc.frequency.value = freq;
                gain.gain.setValueAtTime(0.05, now + i*0.4);
                gain.gain.exponentialRampToValueAtTime(0.01, now + i*0.4 + 0.3);
                
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.start(now + i*0.4);
                osc.stop(now + i*0.4 + 0.35);
                bgmOscillators.push(osc);
            });

            setTimeout(playBGM, melody.length * 400);
        }
    </script>

    <!-- Global Top Bar (Berbaris rapi di atas) -->
    <div class="w-full flex justify-center items-center gap-2 p-2 bg-white/30 backdrop-blur shadow-sm z-50 shrink-0">
        <button id="home-btn" onclick="backToMenu()" class="hidden bg-gray-600 hover:bg-gray-700 text-white px-3 py-2 rounded-full shadow-md text-xs md:text-sm font-bold flex items-center gap-2 transition-colors">
            <i class="fas fa-home"></i> Menu
        </button>
        <button id="bgm-btn" onclick="toggleBGM()" class="bg-red-500 text-white px-3 py-2 rounded-full shadow-md text-xs md:text-sm font-bold flex items-center gap-2">
            <i class="fas fa-volume-mute"></i> BGM Off
        </button>
        <button onclick="toggleFullScreen()" class="bg-blue-500 text-white px-3 py-2 rounded-full shadow-md text-xs md:text-sm font-bold flex items-center gap-2">
            <i class="fas fa-expand"></i> Full Screen
        </button>
    </div>

    <!-- Main Content Wrapper -->
    <div class="flex-1 relative w-full overflow-hidden">
        
        <!-- Rain Canvas Effect -->
        <canvas id="rain-canvas"></canvas>

        <!-- Main Menu -->
        <div id="main-menu" class="absolute inset-0 flex flex-col items-center justify-center z-40 p-4 transition-transform duration-500 bg-white/80">
            <!-- Kotak Pilihan Mode (Tanpa tombol karya) -->
            <div class="bg-blue-100 p-8 rounded-3xl shadow-2xl text-center max-w-md w-full border-4 border-blue-400">
                <div class="text-6xl mb-4">🐸🩺</div>
                <h1 class="text-3xl md:text-4xl text-blue-800 mb-2">Katak Pintar P3K</h1>
                <p class="text-gray-700 mb-6 font-bold">Belajar Penanganan Cidera Ringan (SLB)</p>
                
                <div class="space-y-4">
                    <button onclick="initGame('solo')" class="w-full bg-green-500 hover:bg-green-600 text-white py-3 rounded-xl font-bold text-xl shadow-lg transition-transform transform hover:scale-105">
                        <i class="fas fa-user"></i> Mode Solo (1 Pemain)
                    </button>
                    <button onclick="initGame('duel')" class="w-full bg-yellow-500 hover:bg-yellow-600 text-white py-3 rounded-xl font-bold text-xl shadow-lg transition-transform transform hover:scale-105">
                        <i class="fas fa-user-friends"></i> Mode Duel (2 Pemain)
                    </button>
                    <button onclick="initGame('squad')" class="w-full bg-red-500 hover:bg-red-600 text-white py-3 rounded-xl font-bold text-xl shadow-lg transition-transform transform hover:scale-105">
                        <i class="fas fa-users"></i> Mode Squad (4 Pemain)
                    </button>
                </div>
            </div>

            <!-- Footer Teks Karya (Absolute Bottom) -->
            <div class="absolute bottom-4 left-0 right-0 text-center text-slate-500 text-[10px] md:text-xs font-sans tracking-wide px-4 pointer-events-none opacity-80">
                <p class="font-semibold mb-0.5">Karya : GUNTUR DIAN HARNANTO, S.Pd</p>
                <p class="font-normal">( REGIONAL II / BACTH II )</p>
            </div>
        </div>

        <!-- Game Board Container -->
        <div id="game-board" class="hidden absolute inset-0">
            <!-- Player containers will be injected here -->
        </div>

    </div>

    <script>
        // Data Soal (Disesuaikan untuk SLB - Bahasa sederhana, visual jelas)
        const questionsData = [
            {
                q: "Apa yang dilakukan jika teman jatuh dan kakinya memar (kebiruan)?",
                options: [
                    { text: "Kompres Es", icon: "🧊", correct: true },
                    { text: "Siram Air Panas", icon: "☕", correct: false },
                    { text: "Ditiup saja", icon: "💨", correct: false },
                    { text: "Beri Obat Merah", icon: "🩸", correct: false }
                ]
            },
            {
                q: "Tangan Roni berdarah karena lecet terjatuh. Apa langkah pertamanya?",
                options: [
                    { text: "Dibiarkan", icon: "🤷‍♂️", correct: false },
                    { text: "Cuci Air Bersih", icon: "🚰", correct: true },
                    { text: "Ikat dengan Tali", icon: "🎗️", correct: false },
                    { text: "Diusap Tangan", icon: "✋", correct: false }
                ]
            },
            {
                q: "Hidung Budi berdarah (mimisan). Budi harus...",
                options: [
                    { text: "Lari-lari", icon: "🏃", correct: false },
                    { text: "Tidur Terlentang", icon: "🛌", correct: false },
                    { text: "Tunduk & Pencet Hidung", icon: "👃", correct: true },
                    { text: "Menangis", icon: "😭", correct: false }
                ]
            },
            {
                q: "Tidak sengaja kena air teh panas. Apa yang harus dilakukan?",
                options: [
                    { text: "Siram Air Mengalir", icon: "🚿", correct: true },
                    { text: "Oles Pasta Gigi", icon: "🪥", correct: false },
                    { text: "Oles Mentega", icon: "🧈", correct: false },
                    { text: "Bungkus Plastik", icon: "🛍️", correct: false }
                ]
            },
            {
                q: "Kaki keseleo/terkilir saat olahraga. Harus bagaimana?",
                options: [
                    { text: "Dipaksa Jalan", icon: "🚶", correct: false },
                    { text: "Istirahat & Kompres Es", icon: "🛋️", correct: true },
                    { text: "Diberi Balsem Panas", icon: "🔥", correct: false },
                    { text: "Ditekan kuat", icon: "💪", correct: false }
                ]
            }
        ];

        // Fullscreen API
        function toggleFullScreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Error attempting to enable full-screen mode: ${err.message} (${err.name})`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        // Rain Effect System
        const canvas = document.getElementById('rain-canvas');
        const ctx = canvas.getContext('2d');
        let drops = [];
        let rainInterval;
        let isRaining = false;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        function startRain() {
            if(isRaining) return;
            isRaining = true;
            canvas.style.display = 'block';
            drops = [];
            for(let i=0; i<100; i++) {
                drops.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    l: Math.random() * 20 + 10,
                    v: Math.random() * 10 + 15
                });
            }
            requestAnimationFrame(drawRain);
        }

        function stopRain() {
            isRaining = false;
            canvas.style.display = 'none';
        }

        function drawRain() {
            if(!isRaining) return;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(174,194,224,0.5)';
            ctx.lineWidth = 1;
            ctx.lineCap = 'round';
            
            ctx.beginPath();
            for(let i=0; i<drops.length; i++) {
                let p = drops[i];
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p.x, p.y + p.l);
                p.y += p.v;
                if(p.y > canvas.height) {
                    p.y = -20;
                    p.x = Math.random() * canvas.width;
                }
            }
            ctx.stroke();
            requestAnimationFrame(drawRain);
        }

        // Player Game Class
        class PlayerGame {
            constructor(id, name, color) {
                this.id = id;
                this.name = name;
                this.color = color;
                this.score = 0;
                this.lives = 3;
                this.currentQuestionIndex = 0;
                this.isAnimating = false;
                this.questions = this.shuffleArray([...questionsData]); 
                
                this.buildUI();
                this.loadQuestion();
            }

            shuffleArray(array) {
                for (let i = array.length - 1; i > 0; i--) {
                    const j = Math.floor(Math.random() * (i + 1));
                    [array[i], array[j]] = [array[j], array[i]];
                }
                return array;
            }

            buildUI() {
                this.container = document.createElement('div');
                this.container.className = 'player-container';
                this.container.id = `player-${this.id}`;

                this.container.innerHTML = `
                    <div class="player-layout">
                        <div class="game-visual" id="visual-${this.id}">
                            <div class="absolute top-2 left-2 right-2 flex justify-between z-10 font-bold text-white drop-shadow-md">
                                <span class="bg-${this.color}-500 px-2 py-1 rounded">${this.name}</span>
                                <span id="lives-${this.id}" class="text-red-500 text-lg drop-shadow-md">❤️❤️❤️</span>
                                <span>⭐ <span id="score-${this.id}">0</span></span>
                            </div>
                            <!-- Leaves and Frog -->
                            <div id="leaves-container-${this.id}" class="w-full h-full relative"></div>
                            <div id="frog-${this.id}" class="frog">🐸</div>
                        </div>
                        <div class="game-controls">
                            <div class="question-card shadow-sm">
                                <h3 id="question-text-${this.id}" class="text-sm md:text-base font-bold text-blue-900">Pertanyaan...</h3>
                            </div>
                            <div class="answers-grid" id="answers-${this.id}">
                                <!-- Buttons injected here -->
                            </div>
                        </div>
                        <div id="gameover-${this.id}" class="game-over-overlay">
                            <h2 class="text-4xl mb-2">Tenggelam!</h2>
                            <p class="mb-4">Skor: <span id="final-score-${this.id}"></span></p>
                            <button onclick="players[${this.id-1}].reset()" class="bg-white text-blue-600 px-4 py-2 rounded-xl font-bold">Coba Lagi</button>
                        </div>
                    </div>
                `;
            }

            updateLivesUI() {
                const livesEl = this.container.querySelector(`#lives-${this.id}`);
                if (livesEl) {
                    livesEl.innerText = '❤️'.repeat(this.lives);
                }
            }

            loadQuestion() {
                if(this.currentQuestionIndex >= this.questions.length) {
                    this.questions = this.shuffleArray([...questionsData]);
                    this.currentQuestionIndex = 0;
                }

                // Kembalikan ekspresi katak ke normal saat memuat soal baru
                const frog = this.container.querySelector(`#frog-${this.id}`);
                if(frog) frog.innerText = "🐸"; 

                const qData = this.questions[this.currentQuestionIndex];
                this.container.querySelector(`#question-text-${this.id}`).innerText = qData.q;
                
                const answersContainer = this.container.querySelector(`#answers-${this.id}`);
                answersContainer.innerHTML = '';
                
                const visualContainer = this.container.querySelector(`#leaves-container-${this.id}`);
                visualContainer.innerHTML = ''; // Clear leaves
                
                // Shuffle options for this display
                const options = this.shuffleArray(qData.options.map((opt, i) => ({...opt, originalIndex: i})));

                // Create Target Leaf (A single leaf above the frog for visual purpose)
                const leaf = document.createElement('div');
                leaf.className = 'leaf-platform';
                leaf.style.bottom = '150px'; // Initial position above frog
                leaf.style.left = '50%';
                leaf.style.transform = 'translateX(-50%)';
                leaf.innerText = "?";
                visualContainer.appendChild(leaf);
                
                // Animate leaf appearance
                setTimeout(() => leaf.style.opacity = '1', 50);

                options.forEach((opt) => {
                    const btn = document.createElement('button');
                    btn.className = 'answer-btn shadow-sm';
                    btn.innerHTML = `
                        <div class="answer-icon">${opt.icon}</div>
                        <div class="answer-text">${opt.text}</div>
                    `;
                    btn.onclick = () => this.handleAnswer(opt.correct, leaf);
                    answersContainer.appendChild(btn);
                });
            }

            handleAnswer(isCorrect, targetLeaf) {
                if(this.isAnimating) return;
                this.isAnimating = true;

                const frog = this.container.querySelector(`#frog-${this.id}`);
                
                if(isCorrect) {
                    frog.innerText = "🐸🥳"; // Ekspresi bahagia saat benar
                    playCorrectSound();
                    playJumpSound();
                    targetLeaf.innerText = "✓";
                    targetLeaf.style.backgroundColor = "#22c55e";

                    // Animate Frog Jump
                    frog.classList.add('anim-jump');
                    
                    // Move leaf down to simulate moving forward
                    setTimeout(() => {
                        targetLeaf.style.bottom = '20px';
                        targetLeaf.style.opacity = '0';
                        frog.classList.remove('anim-jump');
                        
                        this.score += 10;
                        this.container.querySelector(`#score-${this.id}`).innerText = this.score;
                        this.currentQuestionIndex++;
                        this.isAnimating = false;
                        this.loadQuestion();
                    }, 500);

                } else {
                    this.lives--;
                    this.updateLivesUI();
                    
                    frog.innerText = "🐸😭"; // Ekspresi sedih saat salah
                    playWrongSound();
                    playSplashSound();
                    startRain(); // Global effect
                    targetLeaf.innerText = "✗";
                    targetLeaf.style.backgroundColor = "#ef4444";
                    
                    // Sink animation
                    frog.classList.add('anim-sink');
                    this.createRipple();

                    setTimeout(() => {
                        if (this.lives > 0) {
                            // Bangkit kembali jika masih ada nyawa
                            frog.classList.remove('anim-sink');
                            frog.innerText = "🐸";
                            this.isAnimating = false;
                            this.currentQuestionIndex++; // Lanjut ke soal berikutnya
                            stopRain();
                            this.loadQuestion();
                        } else {
                            // Game Over jika nyawa habis
                            this.container.querySelector(`#final-score-${this.id}`).innerText = this.score;
                            this.container.querySelector(`#gameover-${this.id}`).classList.add('show');
                            this.isAnimating = false;
                        }
                    }, 1000);
                }
            }

            createRipple() {
                const visual = this.container.querySelector(`#visual-${this.id}`);
                const ripple = document.createElement('div');
                ripple.className = 'ripple';
                
                // Position near bottom center where frog is
                ripple.style.bottom = '20px';
                ripple.style.left = '50%';
                
                visual.appendChild(ripple);
                setTimeout(() => ripple.remove(), 1000);
            }

            reset() {
                this.score = 0;
                this.lives = 3;
                this.currentQuestionIndex = 0;
                this.container.querySelector(`#score-${this.id}`).innerText = this.score;
                this.updateLivesUI();
                
                const frog = this.container.querySelector(`#frog-${this.id}`);
                frog.classList.remove('anim-sink');
                frog.style.transform = '';
                frog.style.opacity = '1';
                frog.innerText = "🐸"; // Kembalikan ke ekspresi normal
                
                this.container.querySelector(`#gameover-${this.id}`).classList.remove('show');
                
                // Stop rain if all players are alive (simplified: just stop rain on reset)
                stopRain(); 
                
                this.loadQuestion();
            }
        }

        let players = [];

        function backToMenu() {
            // Tampilkan kembali menu utama
            document.getElementById('main-menu').style.transform = 'translateY(0)';
            
            // Sembunyikan papan game dan tombol home
            const board = document.getElementById('game-board');
            board.classList.add('hidden');
            board.innerHTML = '';
            players = [];
            
            document.getElementById('home-btn').classList.add('hidden');
            
            // Hentikan efek hujan jika ada
            stopRain();
        }

        function initGame(mode) {
            // Hide Menu, Show Game
            document.getElementById('main-menu').style.transform = 'translateY(-100%)';
            const board = document.getElementById('game-board');
            board.classList.remove('hidden');
            board.innerHTML = ''; // Clear previous
            players = [];
            stopRain();

            // Tampilkan tombol home
            document.getElementById('home-btn').classList.remove('hidden');

            let playerCount = 1;
            let layoutClass = 'layout-solo';

            if(mode === 'duel') { playerCount = 2; layoutClass = 'layout-duel'; }
            if(mode === 'squad') { playerCount = 4; layoutClass = 'layout-squad'; }

            board.className = layoutClass;
            
            // Atur CSS variable untuk styling grid fallback jika diperlukan
            document.documentElement.style.setProperty('--player-count', playerCount);

            const colors = ['blue', 'red', 'green', 'yellow'];

            for(let i = 0; i < playerCount; i++) {
                const player = new PlayerGame(i+1, `Pemain ${i+1}`, colors[i]);
                players.push(player);
                board.appendChild(player.container);
            }

            // Start Audio context automatically on interaction
            if(audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

    </script>
</body>
</html>
